<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAFTB — Lifetime Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --bg: #141008;
      --panel: #1e1a08;
      --border: #c8a000;
      --red: #d93050;
      --gold: #f0c000;
      --orange: #ff7820;
      --white: #f5eed0;
      --green: #3aaa68;
      --dim: #8a7a50;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #1c1608 0%, #141008 50%, #191200 100%);
      background-attachment: fixed;
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container { max-width: 980px; margin: 0 auto; padding: 0 20px; }

    /* ── HEADER ── */
    .site-header { text-align: center; padding: 44px 16px 28px; }

    /* Press Start 2P lives here and only here */
    .site-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.8rem, 6vw, 3.4rem);
      color: var(--gold);
      text-shadow: 3px 3px 0 rgba(0,0,0,0.8);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .site-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--orange);
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    .header-divider {
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--orange), var(--gold), transparent);
      margin: 24px 0;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 36px;
      background: var(--panel);
      border: 2px solid var(--border);
      padding: 6px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      background: transparent;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn:hover { color: var(--gold); }
    .tab-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); }

    /* ── HERO CARDS ── */
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 40px;
    }

    .hero-card {
      background: var(--panel);
      border: 2px solid var(--border);
      padding: 20px 12px;
      text-align: center;
    }

    /* Hero numbers: big, pixel font is fine here — it's large enough to read */
    .hero-val {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      color: var(--gold);
      display: block;
      margin-bottom: 10px;
    }

    .hero-lbl {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* ── SECTION HEADER ── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .section-head-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-style: italic;
      font-size: 1.25rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .section-head-line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── TABLES (leaderboard + nemesis) ── */
    .player-grid { margin-bottom: 44px; }
    .nemesis-wrap { overflow-x: auto; margin-bottom: 44px; border: 2px solid var(--border); }

    .nemesis-table { width: 100%; border-collapse: collapse; }

    .nemesis-table thead th {
      background: var(--panel);
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .nemesis-table thead th.sortable { cursor: pointer; user-select: none; }
    .nemesis-table thead th.sortable:hover { color: var(--white); }
    .nemesis-table thead th.sort-active { color: var(--orange); }

    .nemesis-table tbody tr { border-bottom: 1px solid rgba(200,160,0,0.12); }
    .nemesis-table tbody tr:hover { background: rgba(255,120,32,0.06); }

    .nemesis-table tbody td {
      padding: 12px 16px;
      font-size: 1rem;
      color: var(--white);

    /* ── FORMS ── */
    .admin-section { margin-bottom: 44px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }

      font-weight: 700;
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.1em;

    .form-select option { background: #1e1a08; }

    .teams-grid {

      font-size: 1rem;

      text-transform: uppercase;

    /* ── BUTTONS ── */
    .btn {

      font-weight: 800;

      letter-spacing: 0.08em;

    .btn-primary { background: var(--panel); border-color: var(--orange); color: var(--orange); }
    .btn-primary:hover { background: var(--orange); color: var(--bg); }

    .btn-secondary { background: transparent; border-color: var(--gold); color: var(--gold); }

    .btn-danger { background: transparent; border-color: var(--red); color: var(--red); }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── GAME LIST ── */

      display: flex;
      justify-content: space-between;

      background: rgba(30,22,8,0.5);

    .game-toggle { color: var(--gold); font-size: 0.85rem; flex-shrink: 0; }

    .players-list { margin-bottom: 16px; }

    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(200,160,0,0.12);

      color: var(--white);
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;

    /* ── TOAST ── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9998;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 28px;

    .toast.error { background: #2a0d0d; border-color: var(--red); color: var(--red); }

    @keyframes slideDown {

      .teams-grid { grid-template-columns: 1fr; }
      .vs-badge { padding-top: 4px; }

  </style>
</head>

<script>
const SUPABASE_URL = 'https://fvirekkpybfwsirjynnp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_koxsuf4WX2xu4IIdJ6DZDA_QLAjqiaR';
const { createClient } = window.supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let allPlayers = [];
let allGames = [];
let sortCol = 'wins';
let sortDir = -1; // -1 = descending, 1 = ascending

// ── TABS ──
function switchTab(tab) {
  document.getElementById('tab-leaderboard').style.display = tab === 'leaderboard' ? '' : 'none';
  document.getElementById('tab-admin').style.display = tab === 'admin' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', tab === (i === 0 ? 'leaderboard' : 'admin'));
  });
}

// ── TOAST ──
function showToast(msg, type = 'success') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── DATA ──
async function fetchPlayers() {
  const { data, error } = await db.from('players').select('*').order('name');
  if (error) throw error;
  return data;
}

async function fetchGames() {
  const { data, error } = await db.from('games').select('*')
    .order('game_date', { ascending: false })
    .order('game_sequence', { ascending: false });
  if (error) throw error;
  return data;
}

async function getNextSeq(dateStr) {
  const { data } = await db.from('games').select('game_sequence')
    .eq('game_date', dateStr)
    .order('game_sequence', { ascending: false })
    .limit(1);
  return data && data.length ? data[0].game_sequence + 1 : 1;
}

// ── STATS (ported from stats.py) ──
function computeLeaderboard(players, games) {
  const pidName = Object.fromEntries(players.map(p => [p.id, p.name]));
  const pg = Object.fromEntries(players.map(p => [p.id, []]));

  for (const g of games) {
    const s1 = g.team1_score, s2 = g.team2_score;
    for (const id of [g.team1_player1_id, g.team1_player2_id]) {
      if (!pg[id]) pg[id] = [];
      pg[id].push({ scored: s1, against: s2, win: s1 > s2 ? 1 : 0, loss: s1 < s2 ? 1 : 0 });
    }
    for (const id of [g.team2_player1_id, g.team2_player2_id]) {
      if (!pg[id]) pg[id] = [];
      pg[id].push({ scored: s2, against: s1, win: s2 > s1 ? 1 : 0, loss: s2 < s1 ? 1 : 0 });
    }
  }

  function agg(recs) {
    return {
      wins: recs.reduce((s, r) => s + r.win, 0),
      losses: recs.reduce((s, r) => s + r.loss, 0),
      scored: recs.reduce((s, r) => s + r.scored, 0),
      against: recs.reduce((s, r) => s + r.against, 0),
    };
  }

  return players.map(p => {
    const records = pg[p.id] || [];
    const life = agg(records);
    const l7 = agg(records.slice(0, 7));
    const gp = life.wins + life.losses;
    return {
      name: pidName[p.id],
      wins: life.wins, losses: life.losses,
      winPct: gp === 0 ? '—' : Math.round(life.wins / gp * 100) + '%',
      scored: life.scored, against: life.against,
      diff: life.scored - life.against,
      last7WL: `${l7.wins}-${l7.losses}`,
      last7Diff: l7.scored - l7.against,
    };
  }).sort((a, b) => b.wins - a.wins || b.diff - a.diff);
}

function computeNemesis(players, games) {
  const pidName = Object.fromEntries(players.map(p => [p.id, p.name]));
  const h2h = {};

  function rec(a, b) {
    if (!h2h[a]) h2h[a] = {};
    if (!h2h[a][b]) h2h[a][b] = { wins: 0, losses: 0, diff: 0, games: 0 };
    return h2h[a][b];
  }

  for (const g of games) {
    const t1 = [g.team1_player1_id, g.team1_player2_id];
    const t2 = [g.team2_player1_id, g.team2_player2_id];
    const s1 = g.team1_score, s2 = g.team2_score;
    for (const a of t1) for (const b of t2) {
      const r = rec(a, b);
      r.games++; r.diff += s1 - s2;
      if (s1 > s2) r.wins++; else if (s1 < s2) r.losses++;
      const r2 = rec(b, a);
      r2.games++; r2.diff += s2 - s1;
      if (s2 > s1) r2.wins++; else if (s2 < s1) r2.losses++;
    }
  }

  function best(pid, key, desc) {
    const opps = Object.entries(h2h[pid] || {}).filter(([, d]) => d.games > 0);
    if (!opps.length) return '—';
    opps.sort((a, b) => desc ? b[1][key] - a[1][key] : a[1][key] - b[1][key]);
    const [oppId, data] = opps[0];
    const val = data[key];
    return `${pidName[oppId] || '?'} (${key === 'diff' && val > 0 ? '+' : ''}${val})`;
  }

  return players.map(p => ({
    name: pidName[p.id],
    mwa: best(p.id, 'wins', true),
    mla: best(p.id, 'losses', true),
    bda: best(p.id, 'diff', true),
    wda: best(p.id, 'diff', false),
  }));
}

// ── RENDER ──
const RANKS = ['🥇', '🥈', '🥉'];

function dc(val) {
  return val > 0 ? 'pos' : val < 0 ? 'neg' : 'neu';
}

function renderHeroCards() {
  const pts = allGames.reduce((s, g) => s + g.team1_score + g.team2_score, 0);
  document.getElementById('hero-cards').innerHTML = `
    <div class="hero-card"><span class="hero-val">${allGames.length}</span><span class="hero-lbl">GAMES PLAYED</span></div>
    <div class="hero-card"><span class="hero-val">${allPlayers.length}</span><span class="hero-lbl">PLAYERS</span></div>
    <div class="hero-card"><span class="hero-val">${pts.toLocaleString()}</span><span class="hero-lbl">POINTS SCORED</span></div>
  `;
}

function colorDiff(val) {
  if (val === '—') return `style="color:var(--dim)"`;
  const n = parseFloat(val);
  if (n > 0) return `style="color:var(--green);font-weight:900"`;
  if (n < 0) return `style="color:var(--red);font-weight:900"`;
  return `style="color:var(--dim)"`;
}

function fmtDiff(val) {
  return val > 0 ? `+${val}` : `${val}`;
}

function setSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  renderLeaderboard();
}

function applySortToRows(rows) {
  return [...rows].sort((a, b) => {
    if (sortCol === 'name') return sortDir * a.name.localeCompare(b.name);
    if (sortCol === 'winPct') {
      const av = a.winPct === '—' ? -1 : parseFloat(a.winPct);
      const bv = b.winPct === '—' ? -1 : parseFloat(b.winPct);
      return sortDir * (bv - av);
    }
    if (sortCol === 'last7WL') {
      return sortDir * (parseInt(b.last7WL) - parseInt(a.last7WL));
    }
    return sortDir * (b[sortCol] - a[sortCol]);
  });
}

function sortTh(col, label) {
  const active = sortCol === col ? ' sort-active' : '';
  const arrow = sortCol === col ? (sortDir === -1 ? ' ▼' : ' ▲') : '';
  return `<th class="sortable${active}" onclick="setSort('${col}')">${label}${arrow}</th>`;
}

function renderLeaderboard() {
  const base = computeLeaderboard(allPlayers, allGames);
  const rows = applySortToRows(base);
  const el = document.getElementById('player-grid');
  if (!rows.length) {
    el.innerHTML = '<div class="empty-state">No players yet. Add players in the Admin tab.</div>';
    return;
  }

  // Rank is always based on wins/diff default order (base array), not current sort
  const rankMap = {};
  base.forEach((r, i) => rankMap[r.name] = RANKS[i] || (i + 1));

  el.innerHTML = `
    <div style="overflow-x:auto;border:2px solid var(--border)">
      <table class="nemesis-table">
        <thead><tr>
          <th style="text-align:center">#</th>
          ${sortTh('name', 'PLAYER')}
          ${sortTh('wins', 'W')}
          ${sortTh('losses', 'L')}
          ${sortTh('winPct', 'WIN%')}
          ${sortTh('diff', 'PTS DIFF')}
          ${sortTh('scored', 'PTS SCORED')}
          ${sortTh('against', 'PTS AGAINST')}
          ${sortTh('last7WL', 'LAST 7')}
          ${sortTh('last7Diff', 'L7 DIFF')}
        </tr></thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td style="text-align:center;font-size:1.1rem">${rankMap[r.name]}</td>
              <td style="font-weight:900;font-size:1.15rem;text-transform:uppercase;color:var(--white)">${r.name}</td>
              <td style="color:var(--green);font-weight:900;font-size:1.1rem">${r.wins}</td>
              <td style="color:var(--red);font-weight:900;font-size:1.1rem">${r.losses}</td>
              <td ${colorDiff(r.winPct === '—' ? '—' : (parseFloat(r.winPct) >= 50 ? '1' : '-1'))}>${r.winPct}</td>
              <td ${colorDiff(fmtDiff(r.diff))}>${fmtDiff(r.diff)}</td>
              <td>${r.scored}</td>
              <td>${r.against}</td>
              <td>${r.last7WL}</td>
              <td ${colorDiff(fmtDiff(r.last7Diff))}>${fmtDiff(r.last7Diff)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderNemesis() {
  const rows = computeNemesis(allPlayers, allGames);
  const el = document.getElementById('nemesis-wrap');
  if (!rows.length) {
    el.innerHTML = '<div class="empty-state">No data yet.</div>';
    return;
  }
  el.innerHTML = `
    <table class="nemesis-table">
      <thead><tr>
        <th>Player</th>
        <th>Most Wins Against</th>
        <th>Most Losses Against</th>
        <th>Best Diff Against</th>
        <th>Worst Diff Against</th>
      </tr></thead>
      <tbody>${rows.map(r => `
        <tr>
          <td>${r.name}</td>
          <td>${r.mwa}</td>
          <td>${r.mla}</td>
          <td>${r.bda}</td>
          <td>${r.wda}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function selOpts(currentId) {
  return allPlayers.map(p =>
    `<option value="${p.id}"${p.id === currentId ? ' selected' : ''}>${p.name}</option>`
  ).join('');
}

function renderPlayerSelects() {
  const defaults = [0, 1, 2, 3];
  ['t1p1', 't1p2', 't2p1', 't2p2'].forEach((id, i) => {
    const el = document.getElementById(id);
    const prev = el.value;
    el.innerHTML = allPlayers.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    if (allPlayers.find(p => p.id === prev)) el.value = prev;
    else if (allPlayers[defaults[i]]) el.value = allPlayers[defaults[i]].id;
  });
  const ok = allPlayers.length >= 4;
  document.getElementById('players-warning').style.display = ok ? 'none' : '';
  document.getElementById('save-btns').style.display = ok ? '' : 'none';
  document.getElementById('teams-grid').style.display = ok ? '' : 'none';
}

function renderPlayersList() {
  const el = document.getElementById('players-list');
  if (!allPlayers.length) {
    el.innerHTML = '<div class="empty-state">No players yet.</div>';
    return;
  }
  el.innerHTML = allPlayers.map(p => `
    <div class="player-row">
      <span class="player-row-name">${p.name}</span>
      <button class="btn btn-danger" style="font-size:0.45rem;padding:6px 10px" onclick="deletePlayer('${p.id}','${p.name}')">🗑 REMOVE</button>
    </div>
  `).join('');
}

function renderGameList() {
  const el = document.getElementById('game-list');
  if (!allGames.length) {
    el.innerHTML = '<div class="empty-state">No games recorded yet.</div>';
    return;
  }
  const idName = Object.fromEntries(allPlayers.map(p => [p.id, p.name]));
  el.innerHTML = allGames.map(g => {
    const n = id => idName[id] || '?';
    const s1 = g.team1_score, s2 = g.team2_score;
    const w1 = s1 > s2 ? ' ✓' : '', w2 = s2 > s1 ? ' ✓' : '';
    const label = `${g.game_date} · G${g.game_sequence}  |  ${n(g.team1_player1_id)} & ${n(g.team1_player2_id)}${w1}  ${s1}–${s2}  ${n(g.team2_player1_id)} & ${n(g.team2_player2_id)}${w2}`;
    return `
      <div class="game-item">
        <div class="game-item-header" onclick="toggleGame('${g.id}')">
          <span class="game-item-label">${label}</span>
          <span class="game-toggle" id="tog-${g.id}">▼</span>
        </div>
        <div class="game-item-body" id="body-${g.id}">
          <div class="form-row">
            <div class="form-group" style="max-width:200px">
              <label class="form-label">Date</label>
              <input type="date" id="ed-${g.id}" class="form-input" value="${g.game_date}">
            </div>
            <div class="form-group" style="max-width:120px">
              <label class="form-label">Game #</label>
              <input type="number" id="es-${g.id}" class="form-input" min="1" value="${g.game_sequence}">
            </div>
          </div>
          <div class="teams-grid">
            <div>
              <div class="team-label t1">TEAM 1</div>
              <div class="form-group">
                <label class="form-label">Player 1</label>
                <select id="e1a-${g.id}" class="form-select">${selOpts(g.team1_player1_id)}</select>
              </div>
              <div class="form-group" style="margin-top:8px">
                <label class="form-label">Player 2</label>
                <select id="e1b-${g.id}" class="form-select">${selOpts(g.team1_player2_id)}</select>
              </div>
              <div class="form-group" style="margin-top:8px">
                <label class="form-label">Score</label>
                <input type="number" id="e1s-${g.id}" class="form-input" min="0" value="${s1}">
              </div>
            </div>
            <div class="vs-badge">VS</div>
            <div>
              <div class="team-label t2">TEAM 2</div>
              <div class="form-group">
                <label class="form-label">Player 1</label>
                <select id="e2a-${g.id}" class="form-select">${selOpts(g.team2_player1_id)}</select>
              </div>
              <div class="form-group" style="margin-top:8px">
                <label class="form-label">Player 2</label>
                <select id="e2b-${g.id}" class="form-select">${selOpts(g.team2_player2_id)}</select>
              </div>
              <div class="form-group" style="margin-top:8px">
                <label class="form-label">Score</label>
                <input type="number" id="e2s-${g.id}" class="form-input" min="0" value="${s2}">
              </div>
            </div>
          </div>
          <div class="btn-row" style="margin-top:12px">
            <button class="btn btn-primary" onclick="updateGame('${g.id}')">💾 SAVE CHANGES</button>
            <button class="btn btn-danger" onclick="confirmDelete('${g.id}')">🗑 DELETE</button>
          </div>
          <div id="conf-${g.id}" class="confirm-box" style="display:none">
            <p>DELETE THIS GAME PERMANENTLY?</p>
            <div class="btn-row">
              <button class="btn btn-danger" onclick="deleteGame('${g.id}')">YES, DELETE</button>
              <button class="btn btn-secondary" onclick="document.getElementById('conf-${g.id}').style.display='none'">CANCEL</button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleGame(id) {
  const body = document.getElementById(`body-${id}`);
  const tog = document.getElementById(`tog-${id}`);
  const open = body.classList.toggle('open');
  tog.textContent = open ? '▲' : '▼';
}

function confirmDelete(id) {
  document.getElementById(`conf-${id}`).style.display = '';
}

// ── VALIDATION ──
function validateGame(a, b, c, d) {
  if (new Set([a, b, c, d]).size < 4) return 'A player cannot appear on both teams or twice on the same team.';
  return null;
}

// ── ACTIONS ──
async function saveGame(andNext) {
  const dateVal = document.getElementById('game-date').value;
  if (!dateVal) { showToast('Select a date.', 'error'); return; }

  const t1p1 = document.getElementById('t1p1').value;
  const t1p2 = document.getElementById('t1p2').value;
  const t2p1 = document.getElementById('t2p1').value;
  const t2p2 = document.getElementById('t2p2').value;
  const err = validateGame(t1p1, t1p2, t2p1, t2p2);
  if (err) { showToast(err, 'error'); return; }

  const { error } = await db.from('games').insert({
    game_date: dateVal,
    game_sequence: parseInt(document.getElementById('game-seq').value),
    team1_player1_id: t1p1,
    team1_player2_id: t1p2,
    team2_player1_id: t2p1,
    team2_player2_id: t2p2,
    team1_score: parseInt(document.getElementById('t1score').value) || 0,
    team2_score: parseInt(document.getElementById('t2score').value) || 0,
  });

  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('BOOMSHAKALAKA! GAME SAVED!', 'success');

  document.getElementById('t1score').value = 0;
  document.getElementById('t2score').value = 0;
  if (andNext) {
    const next = await getNextSeq(dateVal);
    document.getElementById('game-seq').value = next;
  }
  await reloadData();
}

async function updateGame(id) {
  const t1p1 = document.getElementById(`e1a-${id}`).value;
  const t1p2 = document.getElementById(`e1b-${id}`).value;
  const t2p1 = document.getElementById(`e2a-${id}`).value;
  const t2p2 = document.getElementById(`e2b-${id}`).value;
  const err = validateGame(t1p1, t1p2, t2p1, t2p2);
  if (err) { showToast(err, 'error'); return; }

  const { error } = await db.from('games').update({
    game_date: document.getElementById(`ed-${id}`).value,
    game_sequence: parseInt(document.getElementById(`es-${id}`).value),
    team1_player1_id: t1p1, team1_player2_id: t1p2,
    team2_player1_id: t2p1, team2_player2_id: t2p2,
    team1_score: parseInt(document.getElementById(`e1s-${id}`).value) || 0,
    team2_score: parseInt(document.getElementById(`e2s-${id}`).value) || 0,
  }).eq('id', id);

  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('UPDATED!', 'success');
  await reloadData();
}

async function deleteGame(id) {
  const { error } = await db.from('games').delete().eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('GAME DELETED.', 'success');
  await reloadData();
}

async function addPlayer() {
  const input = document.getElementById('new-player');
  const name = input.value.trim();
  if (!name) { showToast('Name cannot be blank.', 'error'); return; }
  const { error } = await db.from('players').insert({ name });
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast(`${name} ADDED!`, 'success');
  input.value = '';
  await reloadData();
}

async function deletePlayer(id, name) {
  if (!confirm(`Remove ${name}? This will fail if they have games recorded.`)) return;
  const { error } = await db.from('players').delete().eq('id', id);
  if (error) {
    showToast('Cannot delete — player has games recorded.', 'error');
    return;
  }
  showToast(`${name} REMOVED.`, 'success');
  await reloadData();
}

// ── INIT ──
async function reloadData() {
  [allPlayers, allGames] = await Promise.all([fetchPlayers(), fetchGames()]);
  renderHeroCards();
  renderLeaderboard();
  renderNemesis();
  renderPlayerSelects();
  renderPlayersList();
  renderGameList();
}

async function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('game-date').value = today;
  document.getElementById('game-date').addEventListener('change', async e => {
    document.getElementById('game-seq').value = await getNextSeq(e.target.value);
  });
  document.getElementById('game-seq').value = await getNextSeq(today);
  await reloadData();
}

init();
</script>
</body>
</html>
